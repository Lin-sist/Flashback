spring:
  # 本地开发环境使用固定连接信息，便于快速启动与联调
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/flashback?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: your_dev_password
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3000ms

security:
  jwt:
    # base64 编码的 256bit+ 密钥，示例仅用于本地开发
    secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXphYmNkZWY=
    expiration-millis: 7200000

logging:
  level:
    root: info
    "[com.flashback]": debug
